version: 0.1
cli:
  version: 1.25.0
plugins:
  sources:
    - id: trunk
      ref: v1.10.2
      uri: https://github.com/trunk-io/plugins
lint:
  disabled:
    - bandit
    - svgo
    - flake8
    - black
  enabled:
    - checkov@3.3.8
    - grype@0.110.0
    - osv-scanner@2.2.4
    - pinact@4.0.0
    - taplo@0.10.0
    - trufflehog@3.90.13
    - yamllint@1.38.0
    - ruff@0.15.21
    - actionlint@1.7.8
    - shfmt@3.6.0
    - shellcheck@0.11.0
    - git-diff-check
    - markdownlint@0.49.0
    - isort@8.0.1
    - gitleaks@8.29.0
    - prettier@3.9.5
    - oxipng@9.1.5
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.12.10
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
